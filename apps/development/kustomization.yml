apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/nginx
  - ../base/oauth2-proxy
  - ../base/headlamp
patches:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: nginx
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: nginx.cloud.cturner.xyz
      - op: replace
        path: /metadata/annotations
        value: 
          nginx.ingress.kubernetes.io/auth-url: "https://auth.cloud.cturner.xyz/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.cloud.cturner.xyz/oauth2/start?rd=$scheme://$host$escaped_request_uri"
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: oauth2-proxy
    patch: |-
      - op: replace
        path: /spec/values/podLabels
        value: 
          azure.workload.identity/use: "true"
      - op: replace
        path: /spec/values/serviceAccount/annotations
        value: 
          azure.workload.identity/client-id: "${OAUTH_PROXY_IDENTITY_CLIENT_ID}"
      - op: replace
        path: /spec/values/config/clientID
        value: "${OAUTH_PROXY_CLIENT_ID}"
      - op: replace
        path: /spec/values/config/configFile
        value: |
          provider="entra-id"
          oidc_issuer_url="https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0"
          oidc_email_claim="preferred_username"
          scope="6dae42f8-4368-4678-94ff-3960e28e3630/user.read openid profile email"
          allowed_groups=["${OAUTH_PROXY_ALLOWED_GROUP_ID}"]
          entra_id_federated_token_auth=true
          email_domains=["cturner.xyz"]
          skip_provider_button=true
          whitelist_domains=["*.cloud.cturner.xyz"]
          cookie_domains=[".cloud.cturner.xyz"]
          cookie_secret_file="/run/secrets/oauth2-proxy-cookie-secret/password"
      - op: replace
        path: /spec/values/ingress/hosts
        value:
          - auth.cloud.cturner.xyz
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: headlamp
    patch: |-
      - op: replace
        path: /spec/values/ingress/hosts
        value:
          - host: headlamp.cloud.cturner.xyz
            paths:
             - path: /
               type: Prefix
      - op: replace
        path: /spec/values/ingress/annotations
        value: 
          nginx.ingress.kubernetes.io/auth-url: "https://auth.cloud.cturner.xyz/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.cloud.cturner.xyz/oauth2/start?rd=$scheme://$host$escaped_request_uri"
          nginx.ingress.kubernetes.io/auth-response-headers: "Authorization"

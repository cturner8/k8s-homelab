apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/capacitor
  - ../base/nginx
patches:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: nginx
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: nginx.cloud.cturner.xyz
      - op: replace
        path: /spec/tls/0/hosts
        value: 
          - nginx.cloud.cturner.xyz
      - op: replace
        path: /spec/tls/0/secretName
        value: cturner-xyz-staging-tls
      - op: replace
        path: /metadata/annotations
        value: 
          cert-manager.io/cluster-issuer: "letsencrypt-staging"

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../base/headlamp
secretGenerator:
  - name: headlamp-oidc
    namespace: kube-system
    envs:
      - env/headlamp.env
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: headlamp
    patch: |-
      - op: replace
        path: /spec/values/ingress/hosts
        value:
          - host: headlamp.localhost
            paths:
             - path: /
               type: Prefix

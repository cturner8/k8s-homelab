---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-cookie-secret
  namespace: oauth2-proxy
spec:
  refreshPolicy: OnChange
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: oauth2-proxy-generator

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: flux-system
spec:
  chartRef:
    kind: OCIRepository
    name: valkey
  interval: 10m
  releaseName: valkey
  targetNamespace: oauth2-proxy
  values:
    replica:
      replicaCount: 0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: flux-system
spec:
  interval: 10m
  releaseName: oauth2-proxy
  targetNamespace: oauth2-proxy
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.1.4"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
      interval: 10m
  values:
    sessionStorage:
      type: redis
      redis:
        existingSecret: valkey
        passwordKey: valkey-password
        standalone:
          connectionUrl: redis://valkey-primary:6379
    podLabels: {}
    serviceAccount:
      annotations: {}
    config: {}
    ingress:
      enabled: true
      className: webapprouting.kubernetes.azure.com
      annotations: {}
      hosts: []
      tls: []
    extraVolumes:
      - name: oauth2-proxy-cookie-secret
        secret:
          secretName: oauth2-proxy-cookie-secret
    extraVolumeMounts:
      - name: oauth2-proxy-cookie-secret
        mountPath: /run/secrets/oauth2-proxy-cookie-secret
        readOnly: true

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Nginx
    gethomepage.dev/group: Networking
    gethomepage.dev/icon: sh-nginx
    gethomepage.dev/namespace: nginx
    gethomepage.dev/app: nginx
spec:
  rules:
    - http:
        paths:
          - backend:
              service:
                name: nginx
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts: []

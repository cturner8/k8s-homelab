---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 10m
  releaseName: headlamp
  targetNamespace: kube-system
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 10m
  values:
    persistentVolumeClaim:
      enabled: false
    config:
      watchPlugins: true
      enableHelm: true
      oidc:
        usePKCE: true
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.5.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
        installOptions:
          parallel: true
          maxConcurrent: 2
    ingress:
      enabled: true
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Headlamp
        gethomepage.dev/group: Containers
        gethomepage.dev/icon: sh-headlamp
        gethomepage.dev/namespace: kube-system
        gethomepage.dev/app: headlamp
      hosts: []
      tls: []
    extraManifests:
      - |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: entra-read-only
        subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: "${OAUTH_PROXY_ALLOWED_GROUP_ID}"
        roleRef:
          kind: ClusterRole
          name: view
          apiGroup: rbac.authorization.k8s.io

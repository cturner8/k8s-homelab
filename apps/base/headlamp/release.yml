---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 10m
  releaseName: headlamp
  targetNamespace: kube-system
  chart:
    spec:
      chart: headlamp
      version: "0.40.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 10m
  values:
    config:
      watchPlugins: true
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.5.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
        installOptions:
          parallel: true
          maxConcurrent: 2
    ingress:
      enabled: true
      ingressClassName: webapprouting.kubernetes.azure.com
      annotations: {}
      hosts: []
      tls: []
    extraManifests:
      - |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: entra-read-only
        subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: "${OAUTH_PROXY_ALLOWED_GROUP_ID}"
        roleRef:
          kind: ClusterRole
          name: view
          apiGroup: rbac.authorization.k8s.io

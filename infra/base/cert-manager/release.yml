---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  interval: 10m
  releaseName: cert-manager
  targetNamespace: cert-manager
  values:
    crds:
      enabled: true
    podLabels:
      azure.workload.identity/use: "true"
